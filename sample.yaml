# ── Introduction ──────────────────────────────────────────────────────────
#
# YGOProb is a Yu-Gi-Oh! deck consistency estimator.
#
# Aim
#   Building a competitive YGO deck involves many decisions: how many copies
#   of each card to run, which hand traps to include, how many non-engine to
#   add. YGOProb helps you answer those questions with numbers.
#
#   Write your deck and hand conditions in this YAML file, then hit Run.
#   The simulator draws hundred thousands of opening hands and tells you exactly
#   how often each of your hand suceed — going 1st or 2nd, game 1 or after siding.
#
#   Use it to:
#   - Compare "3 copies vs 2 copies"
#   - See how much consistency you lose by adding non-engine
#   - Measure the impact of side deck choices on your hand
#   - Identify how often a hand has duplicates (bricks)
#
# ── Website usage ──────────────────────────────────────────────────────────
#
# Toolbar (top bar)
#   [Theme]   Toggle between Dark Magician (dark) and Blue-Eyes (light) theme
#   Trials    Number of Monte Carlo iterations (higher = more accurate, slower)
#   [Expand]  Resolve and print all hand conditions without running simulation
#   [▶ Run]   Run the simulation and display hit rates in the results panel
#             Shortcut: Ctrl+Enter (Cmd+Enter on Mac)
#
# Sidebar (left panel)
#   [+ New]   Open a blank deck pre-filled with a template
#   [Sample]  Load the built-in sample deck (this file)
#   [Export]  Download all saved decks as a .zip of .yaml files
#   [Import]  Upload a .zip to restore previously exported decks
#   [Delete]  Permanently delete the currently selected deck
#   Deck list Click any saved deck to load it into the editor
#
# Editor (left pane)
#   Edit your deck YAML directly. The format is documented in the comments
#   at the top of this file. Changes are not saved until you click Save.
#
#   Keyboard shortcuts (Win/Linux | Mac)
#   ── Simulation ────────────────────────────────────
#   Ctrl+Enter          Cmd+Enter       Run simulation
#   ── Editing ───────────────────────────────────────
#   Ctrl+Z              Cmd+Z           Undo
#   Ctrl+Y / Ctrl+Shift+Z  Cmd+Shift+Z Redo
#   Ctrl+/              Cmd+/           Toggle line comment
#   Tab / Shift+Tab     Tab / Shift+Tab Indent / dedent
#   Alt+Up / Alt+Down   Alt+Up / Alt+Down  Move line up / down
#   Ctrl+Shift+K        Cmd+Shift+K     Delete line
#   ── Search ────────────────────────────────────────
#   Ctrl+F              Cmd+F           Find
#   Ctrl+H              Cmd+Alt+F       Find and replace
#   Ctrl+D              Cmd+D           Select next occurrence
#   ── Folding ───────────────────────────────────────
#   Ctrl+Shift+[        Cmd+Alt+[       Fold block
#   Ctrl+Shift+]        Cmd+Alt+]       Unfold block
#
# Deck name bar
#   Edit the deck name in the text field, then click [Save] to persist it
#   (along with the current editor content) to browser local storage.
#
# Results (right pane)
#   After Run or Expand, output appears here.
#   - Each scenario is shown with its per-category hit rates.
#   - [total] is the aggregate chance of hitting any category.
#   - [no-dup] is the % of successful hands that contain no duplicate
#     non-NOPT card (a measure of hand quality / brick avoidance).
#   - Going 2nd scenarios show Turn 1 (5-card) and Turn 2 (+1 draw)
#     separately; Turn 2 only counts when Turn 1 missed.
#

# The file format is yaml, you can use # before each line for comment
deck:
  # - The deck list. The format of each entry is as following:
  #   <card-name> <amount> <group>...
  # - card name cannot use space
  #   .e.g: Ash 2 Fodder NE
  #    - In this case Ash is card name, 2 is the amount in the deck
  # - Fodder means it belongs to Fodder group (which mean it can be
  #   used as tribute fodder for ritual summon.
  # - You can use whichever group you need for your deck combo.
  #   .e.g: Tri-Brigade Kerass requires discard a tri-type,
  #   so you can use a tri-type group for it
  # - You can also write other card name into the group, in case the
  #   card is used as a searcher another card in deck .e.g: ROTA 1 Raye
  # - These following draw cards are supported calculating consistency:
  #   - Desires (This one is broken, WIP)
  #   - Prosperity
  #   - Extravagance
  #   - Upstart (For Chicken Game you can add it as another Upstart)
  #   - Duality
  # - There are 2 special groups
  #   - NE (none-engine). You can add cards that are non-engine to
  #     this group to see it amounts being printed at the results. I
  #     used this to check how many non-engine slots can I afford
  #     without losing consistency
  #   - NOPT: Cards that are in this group are not counted toward
  #     duplicated hands (.e.g: Sky Striker Engage, Infinite
  #     Impermanence) since you can use multiple in a single turn
  main:
    - Martha 3 Name
    - Elis 3 Name
    - Stella 2 Exo Name
    - Sophia 2 Exo Name
    - Irene 1 Exo Name
    - Ichiki 3
    - Pax 3
    - Betrayal 3
    - Returnia 1
    - Vadis 1
    - Shifter 1 NE HT # Handtrap group
    - Ash 3 NE HT
    - Nib 1 NE HT
    - Thrust 1 NE
    - Talent 1 NE
    - Called-by 1 NE
    - Fuwalos 3 NE HT
    - Imperm 3 NE NOPT HT
    - Forbidden-crown 3 NE
    - Sakitama 1
  side:
    - Solemn-accu 2 Solemn
    - Solemn-judge 1 Solemn
    - Carpedivem 1
    - Cross-out 1
    - Droll 2 HT
    - D-fissure 1
    - Purulia 3 HT
    - Duster 1 BB # Board breaker group, only used for going 2nd
    - Evenly 3 BB NOPT

# - Category are collection of hands, where you can put here to later
#   be used in hand section as reference
# - List your acceptable combinations of cards in hand using named categories
# - Each key under hand is a category name (e.g. standard, anti-droll)
# - Probabilities are shown per category, then an aggregate (any category matched).
# - Each entry represents the hand combination, the syntax:
#   <amount> <+/-/=> <card-name/group/category> <AND/OR> < COMB(category, category)> ...
# - .e.g: 2 + A AND 1 - B AND 0 = C
#    means `2 or more of A, 1 or fewer of B, exactly 0 of C`
# - + or = when used with a group larger than 2 (for example 2 + HT),
#   it will consider the success as having 2 or more different card in
#   that group (.e.g: 2 Ash is not success, 1 Ash 1 Belle is success,
#   2 Imperm is success since it is NOPT)
# - if the amount is 1 or more, you can skip it.
#   .e.g: `Ichiki AND Elis` is equivalent to `1 + Ichiki AND 1 + Elis`
# - COMB(cat-a, cat-b) generates every unique pair of hands from two
#   categories. Conditions shared between the two picked hands are
#   merged into one. .e.g: COMB(0-ht, 0-ht) means "two distinct 0-ht
#   hand combinations". You can pass more than two categories like
#   COMB(0-ht, 0-ht, 0-ht)
# - Grouping can be made using bracket ()
category:
  1cc:
    - Martha
    - Pax
    - Betrayal
  sakitama-combo:
    - Sakitama AND Exo
    - Sakitama AND Fuwalos
  weak:
    - Elis AND Exo
    - Stella AND Exo
  2cc:
    - Ichiki AND Exo
    - Ichiki AND Elis
  engine-combo:
    - weak
    - 1cc
    - 2cc
  0-ht:
    - weak
    - 1cc
    - 2cc
  1-ht:
    - COMB(1cc, 1cc)
    - Martha AND (Elis OR Stella OR Ichiki)
    - 0-ht AND (Thrust OR Called-by OR Talent)
  droll-cat:
    - 0-ht AND (Thrust OR Called-by OR Shifter)
    - Pax AND (Betrayal OR Martha)
    - Martha AND (Exo OR Sakitama) AND Ichiki
  charmies-cat:
    - 0-ht AND (Called-by OR Ash)
  nib-cat:
    - Betrayal AND (Name OR Pax OR Ichiki)

# List your scenario under the [hand] section
hand:
  # These are the base cases, for game 1 when you have no side deck yet
  game_1_1st:
    hand: # By default hand is going 1st, with 5 card
      turn_1:
        # We added hands that can build a board here without HT from
        # opponent. This is mostly for knowing how much we brick,
        # and usually already includes combo that are more specific
        # below
        playable:
          - engine-combo
          - sakitama-combo
        # These are the optimal hand that we want to draw, that both
        # have cards that insulate our plays, or help us play through
        # HT. Since these usually includes non-engine, there will be
        # a trade-of between helping our hand go 1st and 2nd in game 1
        optimal:
          - (engine-combo OR sakitama-combo) AND (Thrust OR Called-by)
          - (COMB(1cc, 2cc) OR COMB(1cc, sakitama-combo) OR COMB(1cc, weak) OR COMB(1cc, 1cc)) AND 2 + NE
        # We have each group of hand that can play against a specific HT
        # Use this to check if you have enough chance to draw the hand
        # that can win VS these HT. Usually you want it to at least be
        # higher than the chance of your opponent drawing them
        vs-droll:
          - droll-cat
        vs-nib:
          - nib-cat
        vs-charmies:
          - charmies-cat
  game_1_2nd:
    # When going 2nd, your probabilities can now contain turn_1 and turn_2 hand separately.
    # Turn_1 will contains your first 5 card drawn
    # Turn 2 probablities is only considered when you failed the turn_1 draw
    going_2nd: true
    hand:
      turn_1:
        playable:
          - engine-combo
          - sakitama-combo
        optimal:
          - engine-combo AND ((Fuwalos AND HT) OR 2 + HT) # For example you only want to calculate chance of drawing Fuwalos + HT turn 1
      turn_2:
        playable:
          - 1-ht
  # This case illustrate for when we side in new cards
  # and have new hand combination that we want to calculate
  # In this case we added D-fissure, Cross-out and Carpedivem,
  # which can also counter droll
  side_going_1st:
    side:
      in:
        - Solemn-accu 2
        - Solemn-judge 1
        - D-fissure 1
        - Cross-out 1
        - Droll 2
        - Carpedivem 1
      out:
        - Fuwalos 3
        - Nib 1
        - Forbidden-crown 3
        - Sakitama 1
    hand:
      turn_1:
        standard:
          - engine-combo
        droll:
          - Martha AND Carpedivem
          - Elis AND Exo AND Carpedivem
          - engine-combo AND (D-fissure OR (Cross-out AND 1 - Droll))
          - droll-cat
        nib:
          - Martha AND Carpedivem
          - Betrayal AND Carpedivem
          - nib-cat
        anti-bb:
          - engine-combo AND Solemn
  # This scenario is example for calculating the chance of drawing
  # Fuwalos on turn 1 going 2nd, and if that fails we try to see the
  # chance of drawing BB on turn 2
  side_going_2nd_bb:
    going_2nd: true
    side:
      in:
        - Evenly 3
        - Duster 1
      out:
        - Nib 1
        - Sakitama 1
        - Forbidden-crown 2
    hand:
      turn_1:
        optimal:
          - engine-combo AND Fuwalos
      turn_2:
        optimal:
          - engine-combo AND 2 + BB
  side_going_2nd_ht:
    going_2nd: true
    side:
      in:
        - Droll 2
      out:
        - Talent 1
        - Sakitama 1
    hand:
      # In this case, even though we go 2nd, assuming that we will
      # just auto-lose if we cannot handtrap our opponent, we only
      # care about getting HT on the turn_1 hand
      turn_1:
        with_ht:
          - engine-combo AND 2 + HT
