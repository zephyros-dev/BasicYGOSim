<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YGOProb</title>
  <!-- Set theme before CSS renders to avoid flash -->
  <script>
    (function(){
      var s = localStorage.getItem('ygoprob_theme');
      var d = s ? s === 'dark' : !window.matchMedia('(prefers-color-scheme: light)').matches;
      document.documentElement.dataset.theme = d ? 'dark' : 'light';
    })();
  </script>
</head>
<body>
  <div id="toolbar">
    <span id="logo">YGOProb</span>
    <div class="spacer"></div>
    <a href="https://github.com/zephyros-dev/BasicYGOSim" target="_blank" rel="noopener" class="btn btn-sm btn-icon" title="View source on GitHub" aria-label="GitHub">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.66 7.66 0 0 1 2-.27c.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>
    </a>
    <a href="https://github.com/zephyros-dev/BasicYGOSim/issues/new" target="_blank" rel="noopener" class="btn btn-sm" title="Report an issue on GitHub">Report issue</a>
    <button id="btn-theme" class="btn btn-sm btn-icon"></button>
    <label id="trials-label">Trials:</label>
    <input id="trials-input" type="number" value="100000" min="1000" step="10000" />
    <button id="btn-expand" class="btn btn-sm" title="Show expanded hand conditions for each scenario without simulating">Expand</button>
    <button id="btn-run" class="btn btn-primary" title="Run Monte Carlo simulation">&#9654; Run</button>
  </div>
  <div id="main">
    <aside id="sidebar">
      <div id="sidebar-header">Saved Decks</div>
      <div id="sidebar-actions">
        <button id="btn-new" class="btn btn-sm" title="Create a new deck from template">+ New</button>
        <button id="btn-sample" class="btn btn-sm" title="Load the built-in sample deck">Sample</button>
        <button id="btn-export" class="btn btn-sm" title="Export all saved decks as a zip">Export</button>
        <button id="btn-import" class="btn btn-sm" title="Import decks from a zip file">Import</button>
        <button id="btn-delete" class="btn btn-sm btn-danger" title="Delete the current deck">Delete</button>
      </div>
      <div id="deck-list"></div>
    </aside>
    <div id="panel">
      <div id="deck-name-bar">
        <input id="deck-name" type="text" placeholder="Deck name…" />
        <button id="btn-save" class="btn btn-sm" title="Save the current deck">Save</button>
      </div>
      <div id="split-pane">
        <div id="editor-container"></div>
        <div id="resizer"></div>
        <div id="results-panel">
          <div id="results-toolbar">
            <span id="results-label">Results</span>
            <div class="spacer"></div>
            <span id="status-msg"></span>
          </div>
          <pre id="results"></pre>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
  <script>
    window.addEventListener('error', function(e) {
      document.body.insertAdjacentHTML('beforeend',
        '<div style="position:fixed;top:0;left:0;right:0;background:#e06c75;color:#fff;padding:8px 12px;font-family:monospace;font-size:13px;z-index:9999">JS error: ' + e.message + ' (' + e.filename + ':' + e.lineno + ')</div>'
      );
    });
    window.addEventListener('unhandledrejection', function(e) {
      document.body.insertAdjacentHTML('beforeend',
        '<div style="position:fixed;top:0;left:0;right:0;background:#e06c75;color:#fff;padding:8px 12px;font-family:monospace;font-size:13px;z-index:9999">Unhandled rejection: ' + e.reason + '</div>'
      );
    });
  </script>
</body>
</html>
